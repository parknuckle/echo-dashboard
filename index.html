 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Dashboard</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard">
<button id="fullscreen-btn">
    ⛶ Tap Here for Full Screen
</button>
    <header class="topbar">
        <div class="clock">
            <div id="time">10:18 AM</div>
            <div id="location">Corning, NY</div>
        </div>

       <div class="forecast-strip">

   <div class="forecast-item">

    <div class="forecast-time" id="hour1-time">5 PM</div>
    <div class="forecast-icon" id="hour1-icon">☀️</div>
    <div class="forecast-temp" id="hour1-temp">79°</div>

</div>

    <div class="forecast-item">
        <div class="forecast-time" id="hour2-time">6 PM</div>
        <div class="forecast-icon" id="hour2-icon">🌤</div>
        <div class="forecast-temp" id="hour2-temp">77°</div>
    </div>

    <div class="forecast-item">
        <div class="forecast-time" id="hour3-time">7 PM</div>
        <div class="forecast-icon" id="hour3-icon">🌧</div>
        <div class="forecast-temp" id="hour3-temp">74°</div>
    </div>

    <div class="forecast-item">
        <div class="forecast-time" id="hour4-time">8 PM</div>
        <div class="forecast-icon" id="hour4-icon">🌧</div>
        <div class="forecast-temp" id="hour4-temp">72°</div>    
    </div>

    <div class="forecast-item">
    <div class="forecast-time" id="hour5-time">10 AM</div>
    <div class="forecast-icon" id="hour5-icon">☀️</div>
    <div class="forecast-temp" id="hour5-temp">75°</div>
</div>

<div class="forecast-item">
    <div class="forecast-time" id="hour6-time">11 AM</div>
    <div class="forecast-icon" id="hour6-icon">☀️</div>
    <div class="forecast-temp" id="hour6-temp">78°</div>
</div>
<div class="forecast-item">
    <div class="forecast-time" id="hour7-time">12 PM</div>
    <div class="forecast-icon" id="hour7-icon">☀️</div>
    <div class="forecast-temp" id="hour7-temp">81°</div>
</div>


</div>
    </header>

   <main class="content">

    <div id="content-stage">

        <!-- Screen 1 -->
        <div class="screen active" id="radar-screen">
            <div class="radar-container">
                <iframe
                    id="radarFrame"
                    src="https://www.rainviewer.com/map.html?loc=42.1429,-77.0547,8&oFa=1&oC=1&oU=0&oCS=1&oF=0&oAP=1&c=3&o=83&lm=1&layer=radar&sm=1&sn=1"
                    frameborder="0">
                </iframe>
            </div>
        </div>


        <!-- Screen 2 -->
<div class="screen" id="week-screen">
    
    <div class="week-grid">

        <div class="day-column alt">
            <div class="day-name">Thu</div>
            <div class="day-icon">☀️</div>
            <div class="high-temp">82°</div>
            <div class="low-temp">61°</div>
        </div>

        <div class="day-column">
            <div class="day-name">Fri</div>
            <div class="day-icon">🌤</div>
            <div class="high-temp">79°</div>
            <div class="low-temp">59°</div>
        </div>

        <div class="day-column alt">
            <div class="day-name">Sat</div>
            <div class="day-icon">🌧</div>
            <div class="high-temp">74°</div>
            <div class="low-temp">58°</div>
        </div>

        <div class="day-column">
            <div class="day-name">Sun</div>
            <div class="day-icon">⛅</div>
            <div class="high-temp">77°</div>
            <div class="low-temp">60°</div>
        </div>

        <div class="day-column alt">
            <div class="day-name">Mon</div>
            <div class="day-icon">☀️</div>
            <div class="high-temp">84°</div>
            <div class="low-temp">63°</div>
        </div>

        <div class="day-column">
            <div class="day-name">Tue</div>
            <div class="day-icon">☀️</div>
            <div class="high-temp">86°</div>
            <div class="low-temp">64°</div>
        </div>

        <div class="day-column alt">
            <div class="day-name">Wed</div>
            <div class="day-icon">🌦</div>
            <div class="high-temp">80°</div>
            <div class="low-temp">62°</div>
        </div>

    </div>

</div>

    </div>

      <!-- NOW CARD -->
    <div class="now-card">

        <div class="now-label">NOW</div>

        <div id="temp">--°</div>

        <div id="conditions">Loading...</div>

    </div>

</main>



    <footer class="bottombar">
    <span id="wind">💨 Wind --</span>
    <span id="humidity">💧 Humidity --</span>
    <span id="sunrise">🌅 Sunrise --</span>
</footer>

</div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/keep.js"></script>

</body>
</html>
