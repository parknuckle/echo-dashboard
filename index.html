 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Dashboard</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard">

    <header class="topbar">
        <div class="clock">
            <div id="time">10:18 AM</div>
            <div id="location">Corning, NY</div>
        </div>

        <div class="weather">
    <div id="temp">--°</div>
    <div id="conditions">Loading...</div>
</div>
    </header>

    <main class="content">

       <div class="radar-container">
    <iframe
        id="radarFrame"
        src="https://www.rainviewer.com/map.html?loc=42.1429,-77.0547,7&oFa=1&oC=1&oU=0&oCS=1&oF=0&oAP=1&c=3&o=83&lm=1&layer=radar&sm=1&sn=1"
        frameborder="0">
    </iframe>
</div>

    </main>

    <footer class="bottombar">
    <span id="wind">💨 Wind --</span>
    <span id="humidity">💧 Humidity --</span>
    <span id="sunrise">🌅 Sunrise --</span>
</footer>

</div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>

</body>
</html>
